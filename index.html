<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Display</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #yt-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      border: none;
      display: none;
      z-index: 1;
    }

    #status-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 2;
    }

    #status-screen.hidden { display: none; }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #222;
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status-title {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }

    #status-msg {
      font-size: 1.05rem;
      color: #888;
      max-width: 520px;
      text-align: center;
      line-height: 1.6;
    }

    #next-check {
      font-size: 0.85rem;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- YouTube IFrame API loads the player into this div -->
<div id="yt-frame"></div>

<div id="status-screen">
  <div class="spinner" id="spinner"></div>
  <div id="status-title">Checking for Live Stream...</div>
  <div id="status-msg">Connecting to your channel. Please wait.</div>
  <div id="next-check"></div>
</div>

<!-- Load YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
var CONFIG = {
  WORKER_URL: 'https://rapid-breeze-c02d.camtheitguy.workers.dev/',
  POLL_INTERVAL_SEC: 30,
  OFFLINE_TITLE: 'Stream Offline',
  OFFLINE_MSG: 'No live stream is currently active. This page will automatically reload when the stream begins.',
  FALLBACK_VIDEO_ID: ''
};

var currentVideoId = null;
var pollTimer = null;
var countdownTimer = null;
var secsToNext = CONFIG.POLL_INTERVAL_SEC;
var player = null;
var playerReady = false;

var statusScreen = document.getElementById('status-screen');
var spinner = document.getElementById('spinner');
var titleEl = document.getElementById('status-title');
var msgEl = document.getElementById('status-msg');
var nextCheckEl = document.getElementById('next-check');

// ── YouTube IFrame API callback ──────────────────────────
function onYouTubeIframeAPIReady() {
  playerReady = true;
  // If a videoId was already found before the API loaded, play it now
  if (currentVideoId) {
    loadPlayer(currentVideoId);
  }
}

function loadPlayer(videoId) {
  // If player already exists, just load the new video
  if (player) {
    player.loadVideoById(videoId);
    return;
  }

  // Style the container div to fill the screen
  var container = document.getElementById('yt-frame');
  container.style.display = 'block';
  container.style.position = 'fixed';
  container.style.top = '0';
  container.style.left = '0';
  container.style.width = '100vw';
  container.style.height = '100vh';
  container.style.zIndex = '1';

  player = new YT.Player('yt-frame', {
    height: '100%',
    width: '100%',
    videoId: videoId,
    playerVars: {
      autoplay:        1,
      mute:            1,
      controls:        0,
      loop:            1,
      rel:             0,
      modestbranding:  1,
      playsinline:     1,
      iv_load_policy:  3,
      disablekb:       1
    },
    events: {
      onReady: function(event) {
        event.target.playVideo();
        // Unmute after 1.5 seconds — bypasses autoplay audio restriction
        setTimeout(function() {
          event.target.unMute();
          event.target.setVolume(100);
        }, 1500);
        // Hide the status screen
        statusScreen.classList.add('hidden');
      },
      onStateChange: function(event) {
        // If stream ends, start checking for next stream
        if (event.data === YT.PlayerState.ENDED) {
          currentVideoId = null;
          showStatus('Stream Ended', 'Checking for next stream...', true);
          setTimeout(pollWorker, 5000);
        }
        // If video is paused unexpectedly, resume it
        if (event.data === YT.PlayerState.PAUSED) {
          setTimeout(function() {
            if (player) player.playVideo();
          }, 2000);
        }
      },
      onError: function(event) {
        // On error, reset and try again
        currentVideoId = null;
        showStatus('Stream Error', 'Reconnecting...', true);
        setTimeout(pollWorker, 10000);
      }
    }
  });
}

function showStatus(title, msg, isLoading) {
  currentVideoId = null;
  if (player) {
    player.stopVideo();
    player.destroy();
    player = null;
    // Recreate the target div since destroy() removes it
    var newDiv = document.createElement('div');
    newDiv.id = 'yt-frame';
    document.body.insertBefore(newDiv, document.body.firstChild);
  }
  titleEl.textContent = title;
  msgEl.textContent = msg;
  spinner.style.display = isLoading ? 'block' : 'none';
  statusScreen.classList.remove('hidden');
}

function startCountdown() {
  clearCountdown();
  secsToNext = CONFIG.POLL_INTERVAL_SEC;
  countdownTimer = setInterval(function() {
    secsToNext = Math.max(0, secsToNext - 1);
    nextCheckEl.textContent = 'Checking again in ' + secsToNext + 's...';
  }, 1000);
}

function clearCountdown() {
  clearInterval(countdownTimer);
  nextCheckEl.textContent = '';
}

function pollWorker() {
  fetch(CONFIG.WORKER_URL)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.live && data.videoId) {
        if (currentVideoId !== data.videoId) {
          currentVideoId = data.videoId;
          if (playerReady) {
            loadPlayer(data.videoId);
          }
        }
        clearCountdown();
      } else if (CONFIG.FALLBACK_VIDEO_ID) {
        if (currentVideoId !== CONFIG.FALLBACK_VIDEO_ID) {
          currentVideoId = CONFIG.FALLBACK_VIDEO_ID;
          if (playerReady) {
            loadPlayer(CONFIG.FALLBACK_VIDEO_ID);
          }
        }
      } else {
        showStatus(CONFIG.OFFLINE_TITLE, CONFIG.OFFLINE_MSG, false);
        startCountdown();
      }
    })
    .catch(function(err) {
      console.error('Worker fetch error:', err);
      showStatus('Connection Error', 'Unable to reach stream service. Will retry automatically.', false);
      startCountdown();
    })
    .finally(function() {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(pollWorker, CONFIG.POLL_INTERVAL_SEC * 1000);
    });
}

showStatus('Checking for Live Stream...', 'Connecting to your channel. Please wait.', true);
pollWorker();
</script>

</body>
</html>
