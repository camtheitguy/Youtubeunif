<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Display</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ── Fullscreen iframe ───────────────────────── */
    #yt-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      border: none;
      display: none;
      z-index: 1;
    }

    /* ── Offline / Loading screen ────────────────── */
    #status-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 2;
    }

    #status-screen.hidden { display: none; }

    .yt-logo {
      width: 80px;
      filter: grayscale(0.3);
    }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #222;
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status-title {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }

    #status-msg {
      font-size: 1.05rem;
      color: #888;
      max-width: 520px;
      text-align: center;
      line-height: 1.6;
    }

    #next-check {
      font-size: 0.85rem;
      color: #444;
      margin-top: 8px;
    }

    /* ── Autoplay unlock overlay (invisible) ─────── */
    #unlock-overlay {
      position: fixed;
      inset: 0;
      z-index: 99;
      cursor: pointer;
      background: transparent;
    }
  </style>
</head>
<body>

<!-- Invisible overlay — catches first click to unlock audio autoplay -->
<div id="unlock-overlay" title="Click to start"></div>

<!-- YouTube fullscreen iframe -->
<iframe id="yt-frame"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
  allowfullscreen>
</iframe>

<!-- Status / Offline screen -->
<div id="status-screen">
  <svg class="yt-logo" viewBox="0 0 90 20" xmlns="http://www.w3.org/2000/svg">
    <path fill="#FF0000" d="M27.97 3.44S27.68 1.5 26.84.64C25.78-.52 24.59-.53 24.05-.47 20.11-.2 14.03-.2 14.03-.2h-.01S7.94-.2 4-.47C3.45-.53 2.27-.52 1.21.64.37 1.5.07 3.44.07 3.44S-.2 5.7-.2 7.96v2.11c0 2.26.27 4.52.27 4.52s.3 1.94 1.14 2.8c1.06 1.16 2.46 1.12 3.08 1.24C6.3 18.78 14.02 18.84 14.02 18.84s6.09-.01 10.03-.28c.54-.07 1.73-.06 2.79-1.22.84-.86 1.13-2.8 1.13-2.8s.27-2.26.27-4.52V7.96c0-2.26-.27-4.52-.27-4.52zm-16.6 9.2V5.44l7.54 3.61-7.54 3.59z"/>
  </svg>
  <div class="spinner" id="spinner"></div>
  <div id="status-title">Checking for Live Stream…</div>
  <div id="status-msg">Connecting to your channel. Please wait.</div>
  <div id="next-check"></div>
</div>

<script>
// ╔══════════════════════════════════════════════════════╗
// ║              CONFIGURATION — EDIT HERE              ║
// ╚══════════════════════════════════════════════════════╝
const CONFIG = {
  // Paste your Cloudflare Worker URL here:
  WORKER_URL: 'https://rapid-breeze-c02d.camtheitguy.workers.dev/

  // How often the page polls the worker (seconds)
  // Worker itself only calls YouTube API every 15 min
  POLL_INTERVAL_SEC: 30,

  // Message shown when no stream is active
  OFFLINE_TITLE: '📺 Stream Offline',
  OFFLINE_MSG:   'No live stream is currently active. This page will automatically reload when the stream begins.',

  // Optional: A fallback YouTube video or playlist ID to show when offline
  // Leave as empty string '' to show the offline screen instead
  FALLBACK_VIDEO_ID: '',
};
// ╚══════════════════════════════════════════════════════╝


// ── State ────────────────────────────────────────────────
let currentVideoId  = null;
let pollTimer       = null;
let countdownTimer  = null;
let secsToNext      = CONFIG.POLL_INTERVAL_SEC;
let audioUnlocked   = false;

// ── DOM refs ─────────────────────────────────────────────
const frame         = document.getElementById('yt-frame');
const statusScreen  = document.getElementById('status-screen');
const spinner       = document.getElementById('spinner');
const titleEl       = document.getElementById('status-title');
const msgEl         = document.getElementById('status-msg');
const nextCheckEl   = document.getElementById('next-check');
const unlockOverlay = document.getElementById('unlock-overlay');

// ── Audio unlock via first user gesture ──────────────────
// Unifi Cast may need a one-time click to allow audio.
// The overlay is invisible and captures it silently.
unlockOverlay.addEventListener('click', () => {
  audioUnlocked = true;
  unlockOverlay.style.display = 'none';
  // Reload iframe src to trigger autoplay with audio
  if (frame.src) {
    const src = frame.src;
    frame.src = '';
    setTimeout(() => { frame.src = src; }, 100);
  }
}, { once: true });

// ── Build embed URL ───────────────────────────────────────
function buildEmbedUrl(videoId) {
  const params = new URLSearchParams({
    autoplay:       '1',
    mute:           '0',   // audio ON
    controls:       '0',   // no controls (clean display)
    loop:           '1',
    rel:            '0',
    modestbranding: '1',
    playsinline:    '1',
    enablejsapi:    '0',
  });
  return `https://www.youtube.com/embed/${videoId}?${params}`;
}

// ── Show the live stream ──────────────────────────────────
function showStream(videoId) {
  if (currentVideoId === videoId) return; // already showing — no flicker

  currentVideoId = videoId;
  frame.src = buildEmbedUrl(videoId);
  frame.style.display = 'block';
  statusScreen.classList.add('hidden');
  clearCountdown();
}

// ── Show offline / status screen ─────────────────────────
function showStatus(title, msg, isLoading = false) {
  currentVideoId = null;
  frame.style.display = 'none';
  frame.src = '';

  titleEl.textContent = title;
  msgEl.textContent   = msg;
  spinner.style.display = isLoading ? 'block' : 'none';
  statusScreen.classList.remove('hidden');
}

// ── Countdown under offline message ──────────────────────
function startCountdown() {
  clearCountdown();
  secsToNext = CONFIG.POLL_INTERVAL_SEC;
  countdownTimer = setInterval(() => {
    secsToNext = Math.max(0, secsToNext - 1);
    nextCheckEl.textContent = `Checking again in ${secsToNext}s…`;
  }, 1000);
}

function clearCountdown() {
  clearInterval(countdownTimer);
  nextCheckEl.textContent = '';
}

// ── Main poll function ────────────────────────────────────
async function pollWorker() {
  try {
    const res  = await fetch(CONFIG.WORKER_URL, { cache: 'no-store' });
    const data = await res.json();

    if (data.live && data.videoId) {
      showStream(data.videoId);
    } else if (CONFIG.FALLBACK_VIDEO_ID) {
      showStream(CONFIG.FALLBACK_VIDEO_ID);
    } else {
      showStatus(CONFIG.OFFLINE_TITLE, CONFIG.OFFLINE_MSG, false);
      startCountdown();
    }

  } catch (err) {
    console.error('Worker fetch error:', err);
    showStatus(
      '⚠️ Connection Error',
      'Unable to reach stream service. Will retry automatically.',
      false
    );
    startCountdown();
  }

  // Schedule next poll
  clearTimeout(pollTimer);
  pollTimer = setTimeout(pollWorker, CONFIG.POLL_INTERVAL_SEC * 1000);
}

// ── Kick off on page load ─────────────────────────────────
showStatus('Checking for Live Stream…', 'Connecting to your channel. Please wait.', true);
pollWorker();
</script>

</body>
</html>
