<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Display</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #yt-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      border: none;
      display: none;
      z-index: 1;
    }

    #status-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 2;
    }

    #status-screen.hidden { display: none; }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #222;
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status-title {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }

    #status-msg {
      font-size: 1.05rem;
      color: #888;
      max-width: 520px;
      text-align: center;
      line-height: 1.6;
    }

    #next-check {
      font-size: 0.85rem;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<iframe id="yt-frame"
  allow="autoplay; fullscreen; encrypted-media"
  allowfullscreen>
</iframe>

<div id="status-screen">
  <div class="spinner" id="spinner"></div>
  <div id="status-title">Checking for Live Stream...</div>
  <div id="status-msg">Connecting to your channel. Please wait.</div>
  <div id="next-check"></div>
</div>

<script>
var CONFIG = {
  WORKER_URL: 'https://rapid-breeze-c02d.camtheitguy.workers.dev/',
  POLL_INTERVAL_SEC: 30,
  OFFLINE_TITLE: 'Stream Offline',
  OFFLINE_MSG: 'No live stream is currently active. This page will automatically reload when the stream begins.',
  FALLBACK_VIDEO_ID: ''
};

var currentVideoId = null;
var pollTimer = null;
var countdownTimer = null;
var secsToNext = CONFIG.POLL_INTERVAL_SEC;
var unmuteTimer = null;

var frame = document.getElementById('yt-frame');
var statusScreen = document.getElementById('status-screen');
var spinner = document.getElementById('spinner');
var titleEl = document.getElementById('status-title');
var msgEl = document.getElementById('status-msg');
var nextCheckEl = document.getElementById('next-check');

function buildEmbedUrl(videoId) {
  return 'https://www.youtube.com/embed/' + videoId +
    '?autoplay=1' +
    '&mute=1' +
    '&controls=0' +
    '&loop=1' +
    '&rel=0' +
    '&modestbranding=1' +
    '&playsinline=1' +
    '&enablejsapi=1' +
    '&origin=' + encodeURIComponent(window.location.origin);
}

function unmutePlayer() {
  // Send postMessage commands to unmute the YouTube iframe
  try {
    frame.contentWindow.postMessage(
      JSON.stringify({ event: 'command', func: 'unMute', args: [] }), '*'
    );
    frame.contentWindow.postMessage(
      JSON.stringify({ event: 'command', func: 'setVolume', args: [100] }), '*'
    );
  } catch(e) {
    console.log('postMessage error:', e);
  }
}

function showStream(videoId) {
  if (currentVideoId === videoId) return;
  currentVideoId = videoId;

  // Load iframe muted first (browser allows muted autoplay)
  frame.src = buildEmbedUrl(videoId);
  frame.style.display = 'block';
  statusScreen.classList.add('hidden');
  clearCountdown();

  // Unmute attempts — try multiple times to make sure it sticks
  clearTimeout(unmuteTimer);
  var attempts = [1500, 3000, 5000, 8000];
  attempts.forEach(function(delay) {
    setTimeout(unmutePlayer, delay);
  });
}

function showStatus(title, msg, isLoading) {
  currentVideoId = null;
  frame.style.display = 'none';
  frame.src = '';
  clearTimeout(unmuteTimer);
  titleEl.textContent = title;
  msgEl.textContent = msg;
  spinner.style.display = isLoading ? 'block' : 'none';
  statusScreen.classList.remove('hidden');
}

function startCountdown() {
  clearCountdown();
  secsToNext = CONFIG.POLL_INTERVAL_SEC;
  countdownTimer = setInterval(function() {
    secsToNext = Math.max(0, secsToNext - 1);
    nextCheckEl.textContent = 'Checking again in ' + secsToNext + 's...';
  }, 1000);
}

function clearCountdown() {
  clearInterval(countdownTimer);
  nextCheckEl.textContent = '';
}

function pollWorker() {
  fetch(CONFIG.WORKER_URL)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.live && data.videoId) {
        showStream(data.videoId);
      } else if (CONFIG.FALLBACK_VIDEO_ID) {
        showStream(CONFIG.FALLBACK_VIDEO_ID);
      } else {
        showStatus(CONFIG.OFFLINE_TITLE, CONFIG.OFFLINE_MSG, false);
        startCountdown();
      }
    })
    .catch(function(err) {
      console.error('Worker fetch error:', err);
      showStatus('Connection Error', 'Unable to reach stream service. Will retry automatically.', false);
      startCountdown();
    })
    .finally(function() {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(pollWorker, CONFIG.POLL_INTERVAL_SEC * 1000);
    });
}

showStatus('Checking for Live Stream...', 'Connecting to your channel. Please wait.', true);
pollWorker();
</script>

</body>
</html>
